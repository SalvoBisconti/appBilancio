<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>💰 Bilancio Personale</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1c1c28;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text2: #8b8b9e;
            --accent: #667eea;
            --accent2: #8b5cf6;
            --income: #34d399;
            --expense: #f87171;
            --warning: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            padding: 20px;
            padding-top: 55px;
            border-radius: 0 0 30px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.25);
        }

        .header h1 {
            font-size: 1.7em;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header p {
            opacity: 0.85;
            font-size: 0.9em;
            font-weight: 500;
        }

        .container {
            padding: 0 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Card */
        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 18px;
        }

        /* Bilancio */
        .balance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .period-badge {
            background: rgba(102, 126, 234, 0.2);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
        }

        .balance-amount {
            font-size: 2.6em;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -1px;
        }

        .balance-amount.positive { color: var(--income); }
        .balance-amount.negative { color: var(--expense); }

        .balance-label {
            color: var(--text2);
            font-size: 0.9em;
            margin-bottom: 18px;
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid var(--border);
        }

        .balance-row .label {
            color: var(--text2);
            font-size: 0.95em;
        }

        .balance-row .value {
            font-weight: 700;
            font-size: 1.05em;
        }

        .value.income { color: var(--income); }
        .value.expense { color: var(--expense); }
        .value.carry { color: var(--accent); }

        /* Navigazione */
        .month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border-radius: 20px;
            padding: 14px 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .month-nav button {
            background: var(--surface2);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            font-size: 1.1em;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
            transition: all 0.2s;
        }

        .month-nav button:active {
            transform: scale(0.92);
            background: var(--border);
        }

        .month-nav h3 {
            font-size: 1.05em;
            font-weight: 700;
        }

        /* Toggle tipo */
        .type-toggle {
            display: flex;
            background: var(--surface2);
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 18px;
        }

        .type-toggle button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: var(--text2);
            -webkit-appearance: none;
        }

        .type-toggle button.active {
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .type-toggle button.income-active.active { color: var(--income); }
        .type-toggle button.expense-active.active { color: var(--expense); }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: var(--text2);
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1.05em;
            font-family: inherit;
            background: var(--surface2);
            color: var(--text);
            -webkit-appearance: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface);
        }

        input::placeholder {
            color: #555;
        }

        .submit-btn {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: 16px;
            font-size: 1.05em;
            font-weight: 800;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .submit-btn.income {
            background: linear-gradient(135deg, #059669, #34d399);
            color: white;
        }

        .submit-btn.expense {
            background: linear-gradient(135deg, #dc2626, #f87171);
            color: white;
        }

        .submit-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* Backup buttons */
        .backup-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .backup-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--surface2);
            color: var(--text2);
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            -webkit-appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .backup-btn:active {
            background: var(--border);
        }

        .backup-btn.primary {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Lista */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .filter-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            -webkit-appearance: none;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .transaction-icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .transaction-icon.income { background: rgba(52, 211, 153, 0.15); }
        .transaction-icon.expense { background: rgba(248, 113, 113, 0.15); }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-title {
            font-weight: 700;
            font-size: 1em;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .transaction-meta {
            font-size: 0.82em;
            color: var(--text2);
        }

        .transaction-amount {
            font-weight: 800;
            font-size: 1.05em;
            margin-right: 10px;
            white-space: nowrap;
        }

        .transaction-amount.income { color: var(--income); }
        .transaction-amount.expense { color: var(--expense); }

        .delete-btn {
            background: rgba(248, 113, 113, 0.15);
            border: none;
            color: var(--expense);
            width: 34px;
            height: 34px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
        }

        .delete-btn:active {
            background: rgba(248, 113, 113, 0.3);
        }

        /* Chart */
        .chart-container {
            position: relative;
            height: 220px;
        }

        /* Storico */
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child { border-bottom: none; }

        .history-month {
            font-weight: 700;
            color: var(--text);
        }

        .history-residual {
            font-weight: 800;
        }

        .history-residual.positive { color: var(--income); }
        .history-residual.negative { color: var(--expense); }

        /* Empty */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }

        .empty-state .icon {
            font-size: 3em;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* Notifica */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--surface2);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.9em;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            white-space: nowrap;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification.success { border-color: var(--income); }
        .notification.error { border-color: var(--expense); }

        /* File input nascosto */
        #fileInput { display: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }

        /* Auto backup badge */
        .auto-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(52, 211, 153, 0.1);
            color: var(--income);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 0.75em;
            font-weight: 700;
            margin-left: 8px;
        }

        .auto-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--income);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 Bilancio Personale</h1>
        <p>Periodo: dal 27 al 27 · Tema Scuro</p>
    </div>

    <div class="container">
        <!-- Bilancio -->
        <div class="card">
            <div class="balance-header">
                <h2 style="margin:0">BILANCIO</h2>
                <span class="period-badge" id="periodBadge">...</span>
            </div>
            <div class="balance-amount" id="balanceAmount">€0.00</div>
            <div class="balance-label" id="balanceLabel">...</div>
            
            <div class="balance-row">
                <span class="label">💰 Entrate</span>
                <span class="value income" id="totalIncome">+€0.00</span>
            </div>
            <div class="balance-row">
                <span class="label">💸 Uscite</span>
                <span class="value expense" id="totalExpense">-€0.00</span>
            </div>
            <div class="balance-row">
                <span class="label">📦 Residuo prec.</span>
                <span class="value carry" id="carryOver">€0.00</span>
            </div>
        </div>

        <!-- Navigazione -->
        <div class="month-nav">
            <button onclick="prevMonth()">◀</button>
            <h3 id="monthDisplay">...</h3>
            <button onclick="nextMonth()">▶</button>
        </div>

        <!-- Form -->
        <div class="card">
            <div class="type-toggle">
                <button class="income-active active" onclick="setType('income')" id="btnIncome">📥 Entrata</button>
                <button class="expense-active" onclick="setType('expense')" id="btnExpense">📤 Uscita</button>
            </div>
            
            <form id="transactionForm" onsubmit="addTransaction(event)">
                <div class="form-group">
                    <label>Descrizione</label>
                    <input type="text" id="desc" placeholder="Es. Stipendio, Bolletta..." required>
                </div>
                <div class="form-group">
                    <label>Importo (€)</label>
                    <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required inputmode="decimal">
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="category"></select>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit" class="submit-btn income" id="submitBtn">Aggiungi Entrata</button>
            </form>

            <!-- Backup -->
            <div class="backup-row">
                <button class="backup-btn primary" onclick="downloadBackup()">
                    💾 Salva Backup
                </button>
                <button class="backup-btn" onclick="document.getElementById('fileInput').click()">
                    📂 Carica Backup
                </button>
            </div>
            <input type="file" id="fileInput" accept=".json" onchange="loadBackup(event)">
            
            <div style="text-align:center; margin-top:12px; font-size:0.8em; color:var(--text2)">
                <span class="auto-badge">Auto-backup</span>
                ad ogni inserimento
            </div>
        </div>

        <!-- Grafico -->
        <div class="card">
            <h2>📊 Distribuzione Uscite</h2>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- Transazioni -->
        <div class="card">
            <div class="list-header">
                <h2 style="margin:0">📝 Transazioni</h2>
                <button class="filter-btn" onclick="toggleFilter()" id="filterBtn">Tutto</button>
            </div>
            <div id="transactionList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>Nessuna transazione</p>
                </div>
            </div>
        </div>

        <!-- Storico -->
        <div class="card">
            <h2>📈 Storico Residui</h2>
            <div id="historyList">
                <div class="empty-state">
                    <div class="icon">📊</div>
                    <p>Ancora nessuno storico</p>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">Messaggio</div>

    <script>
        // ============ PERIODO 27-27 ============
        function getPeriodKey(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            const day = d.getDate();
            let year = d.getFullYear();
            let month = d.getMonth();
            
            if (day >= 27) {
                month++;
                if (month > 11) { month = 0; year++; }
            }
            
            return `${year}-${String(month + 1).padStart(2, '0')}`;
        }

        function getPeriodLabel(key) {
            const [y, m] = key.split('-').map(Number);
            return new Date(y, m - 1, 1).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
        }

        function getPeriodRange(key) {
            const [y, m] = key.split('-').map(Number);
            const start = new Date(y, m - 2, 27);
            if (m === 1) { start.setFullYear(y - 1); start.setMonth(11); }
            const end = new Date(y, m - 1, 26, 23, 59, 59);
            return { start, end };
        }

        function getAllPeriodKeys() {
            const keys = new Set();
            transactions.forEach(t => keys.add(getPeriodKey(t.date)));
            keys.add(currentPeriod);
            return Array.from(keys).sort();
        }

        // ============ DATI ============
        let transactions = [];
        let currentType = 'income';
        let currentPeriod = getPeriodKey(new Date().toISOString().slice(0, 10));
        let filterType = 'all';
        let chart = null;
        let autoBackupEnabled = true;

        const categories = {
            income: [
                { value: 'stipendio', label: '💼 Stipendio', emoji: '💼' },
                { value: 'extra', label: '🎁 Extra', emoji: '🎁' },
                { value: 'investimenti', label: '📈 Investimenti', emoji: '📈' },
                { value: 'rimborso', label: '↩️ Rimborso', emoji: '↩️' },
                { value: 'altro-entrata', label: '📦 Altro', emoji: '📦' }
            ],
            expense: [
                { value: 'alimentari', label: '🍎 Alimentari', emoji: '🍎' },
                { value: 'casa', label: '🏠 Casa / Affitto', emoji: '🏠' },
                { value: 'bollette', label: '💡 Bollette', emoji: '💡' },
                { value: 'trasporti', label: '🚗 Trasporti', emoji: '🚗' },
                { value: 'svago', label: '🎮 Svago', emoji: '🎮' },
                { value: 'salute', label: '💊 Salute', emoji: '💊' },
                { value: 'shopping', label: '🛍️ Shopping', emoji: '🛍️' },
                { value: 'altro-uscita', label: '📦 Altro', emoji: '📦' }
            ]
        };

        const categoryEmojis = {};
        Object.values(categories).flat().forEach(c => categoryEmojis[c.value] = c.emoji);

        // ============ INIT ============
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            document.getElementById('date').value = new Date().toISOString().slice(0, 10);
            updateCategoryOptions();
            updateUI();
        });

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('transactions');
                if (saved) transactions = JSON.parse(saved);
            } catch (e) {
                transactions = [];
            }
        }

        // ============ NAVIGAZIONE ============
        function prevMonth() {
            const keys = getAllPeriodKeys();
            const idx = keys.indexOf(currentPeriod);
            if (idx > 0) { currentPeriod = keys[idx - 1]; updateUI(); }
        }

        function nextMonth() {
            const keys = getAllPeriodKeys();
            const idx = keys.indexOf(currentPeriod);
            if (idx < keys.length - 1) { currentPeriod = keys[idx + 1]; updateUI(); }
        }

        // ============ TIPO ============
        function setType(type) {
            currentType = type;
            document.getElementById('btnIncome').classList.toggle('active', type === 'income');
            document.getElementById('btnExpense').classList.toggle('active', type === 'expense');
            
            const btn = document.getElementById('submitBtn');
            btn.className = `submit-btn ${type}`;
            btn.textContent = type === 'income' ? 'Aggiungi Entrata' : 'Aggiungi Uscita';
            
            updateCategoryOptions();
        }

        function updateCategoryOptions() {
            const select = document.getElementById('category');
            select.innerHTML = categories[currentType].map(c => 
                `<option value="${c.value}">${c.label}</option>`
            ).join('');
        }

        // ============ AGGIUNGI ============
        function addTransaction(e) {
            e.preventDefault();
            
            const t = {
                id: Date.now(),
                type: currentType,
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                date: document.getElementById('date').value
            };
            
            transactions.push(t);
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            saveData();
            
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            
            const msg = t.type === 'income' ? 'Entrata aggiunta! 💰' : 'Uscita aggiunta! 💸';
            showNotification(msg, 'success');
            
            // Auto-backup
            if (autoBackupEnabled) {
                setTimeout(() => downloadBackup(true), 500);
            }
            
            updateUI();
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            showNotification('Eliminato! 🗑️', 'success');
            updateUI();
        }

        function toggleFilter() {
            const filters = ['all', 'income', 'expense'];
            const labels = { all: 'Tutto', income: 'Entrate', expense: 'Uscite' };
            const idx = filters.indexOf(filterType);
            filterType = filters[(idx + 1) % filters.length];
            document.getElementById('filterBtn').textContent = labels[filterType];
            updateUI();
        }

        // ============ RESIDUI ============
        function getCarryOver(targetPeriod) {
            const allPeriods = getAllPeriodKeys();
            const targetIdx = allPeriods.indexOf(targetPeriod);
            if (targetIdx <= 0) return 0;
            
            let carry = 0;
            for (let i = 0; i < targetIdx; i++) {
                const p = allPeriods[i];
                const pt = transactions.filter(t => getPeriodKey(t.date) === p);
                const inc = pt.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                const exp = pt.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
                carry += (inc - exp);
            }
            return carry;
        }

        // ============ BACKUP ============
        function downloadBackup(silent = false) {
            const data = {
                app: 'BilancioPersonale',
                version: '1.0',
                exportedAt: new Date().toISOString(),
                transactions: transactions
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `bilancio_backup_${date}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            if (!silent) showNotification('Backup salvato! 💾', 'success');
        }

        function loadBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.transactions || !Array.isArray(data.transactions)) {
                        throw new Error('Formato non valido');
                    }
                    
                    if (transactions.length > 0) {
                        if (!confirm(`Hai ${transactions.length} transazioni attuali. Sovrascrivere con il backup (${data.transactions.length} transazioni)?`)) {
                            return;
                        }
                    }
                    
                    transactions = data.transactions;
                    saveData();
                    updateUI();
                    showNotification('Backup caricato! 📂', 'success');
                } catch (err) {
                    showNotification('Errore: file non valido ❌', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============ UPDATE UI ============
        function updateUI() {
            const periodTrans = transactions.filter(t => getPeriodKey(t.date) === currentPeriod);
            const filtered = filterType === 'all' ? periodTrans : periodTrans.filter(t => t.type === filterType);
            
            const income = periodTrans.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const expense = periodTrans.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const carry = getCarryOver(currentPeriod);
            const balance = income - expense + carry;
            
            // Header
            document.getElementById('monthDisplay').textContent = getPeriodLabel(currentPeriod);
            const range = getPeriodRange(currentPeriod);
            document.getElementById('periodBadge').textContent = 
                `${range.start.getDate()}/${range.start.getMonth()+1} - ${range.end.getDate()}/${range.end.getMonth()+1}`;
            
            // Bilancio
            const balEl = document.getElementById('balanceAmount');
            balEl.textContent = `€${balance.toFixed(2)}`;
            balEl.className = `balance-amount ${balance >= 0 ? 'positive' : 'negative'}`;
            
            document.getElementById('totalIncome').textContent = `+€${income.toFixed(2)}`;
            document.getElementById('totalExpense').textContent = `-€${expense.toFixed(2)}`;
            
            const carryEl = document.getElementById('carryOver');
            carryEl.textContent = `${carry >= 0 ? '+' : ''}€${carry.toFixed(2)}`;
            carryEl.className = `value carry ${carry >= 0 ? 'income' : 'expense'}`;
            
            document.getElementById('balanceLabel').textContent = `Bilancio ${getPeriodLabel(currentPeriod)}`;
            
            updateList(filtered);
            updateChart(periodTrans);
            updateHistory();
        }

        function updateList(list) {
            const container = document.getElementById('transactionList');
            
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Nessuna transazione questo mese</p>
                    </div>`;
                return;
            }
            
            container.innerHTML = list.map(t => `
                <div class="transaction-item">
                    <div class="transaction-icon ${t.type}">
                        ${categoryEmojis[t.category] || '📦'}
                    </div>
                    <div class="transaction-info">
                        <div class="transaction-title">${escapeHtml(t.description)}</div>
                        <div class="transaction-meta">${formatDate(t.date)} · ${t.category}</div>
                    </div>
                    <div class="transaction-amount ${t.type}">
                        ${t.type === 'income' ? '+' : '-'}€${t.amount.toFixed(2)}
                    </div>
                    <button class="delete-btn" onclick="deleteTransaction(${t.id})">🗑</button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
        }

        function updateChart(periodTrans) {
            const ctx = document.getElementById('chart').getContext('2d');
            const expenses = periodTrans.filter(t => t.type === 'expense');
            const catTotals = {};
            expenses.forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; });
            
            const labels = Object.keys(catTotals).map(c => `${categoryEmojis[c] || '📦'} ${c}`);
            const data = Object.values(catTotals);
            const colors = ['#f87171', '#fb923c', '#fbbf24', '#a3e635', '#34d399', '#22d3ee', '#a78bfa', '#f472b6'];
            
            if (chart) chart.destroy();
            
            if (data.length === 0) {
                document.getElementById('chart').style.display = 'none';
                return;
            }
            document.getElementById('chart').style.display = 'block';
            
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 0,
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '68%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 12,
                                font: { size: 11, family: '-apple-system' },
                                color: '#8b8b9e',
                                boxWidth: 10
                            }
                        }
                    }
                }
            });
        }

        function updateHistory() {
            const allPeriods = getAllPeriodKeys();
            const container = document.getElementById('historyList');
            
            if (allPeriods.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📊</div>
                        <p>Ancora nessuno storico</p>
                    </div>`;
                return;
            }
            
            const history = allPeriods.map(p => {
                const pt = transactions.filter(t => getPeriodKey(t.date) === p);
                const inc = pt.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                const exp = pt.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
                const carry = getCarryOver(p);
                const balance = inc - exp + carry;
                return { period: p, label: getPeriodLabel(p), balance };
            }).reverse();
            
            container.innerHTML = history.map(h => `
                <div class="history-item">
                    <span class="history-month">${h.label}</span>
                    <span class="history-residual ${h.balance >= 0 ? 'positive' : 'negative'}">
                        €${h.balance.toFixed(2)}
                    </span>
                </div>
            `).join('');
        }

        // ============ UTILITÀ ============
        function saveData() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        function showNotification(msg, type = 'success') {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.className = `notification ${type} show`;
            setTimeout(() => n.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
